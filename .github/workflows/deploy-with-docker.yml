name: Deploy Sandbox

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t sandbox-app:${IMAGE_TAG} .

      - name: Save Docker image
        run: |
          docker save sandbox-app:${IMAGE_TAG} -o image.tar

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy image to EC2
        run: |
          scp -i ~/.ssh/id_rsa image.tar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/image.tar

      - name: Check file on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "ls -l /tmp/image.tar"

      - name: Load and run Docker image on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            docker load -i /tmp/image.tar
            docker stop sandbox-container || true
            docker rm sandbox-container || true
            docker run -d --name sandbox-container sandbox-app:${GITHUB_SHA}
          EOF